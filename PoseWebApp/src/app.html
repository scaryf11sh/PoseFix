<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
            Este script corre de forma síncrona ANTES de que el navegador pinte nada.
            Garantiza que el tema correcto se aplique incluso en hot-reload de Tauri.
            Default: system (sigue la preferencia del SO)   .
        -->
    <script>
        (function () {
            try {
                var mode = localStorage.getItem("themeMode");
                // Si no hay nada guardado, el default es "system"
                if (!mode) {
                    mode = "system";
                    localStorage.setItem("themeMode", "system");
                }
                var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                var isDark = mode === "dark" || (mode === "system" && prefersDark);
                if (isDark) {
                    document.documentElement.classList.add("dark");
                } else {
                    document.documentElement.classList.remove("dark");
                }
            } catch (e) {
                // Fallback: sigue el sistema
                if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
                    document.documentElement.classList.add("dark");
                }
            }
        })();
    </script>
    %sveltekit.head%
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>

<body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
</body>

</html>
